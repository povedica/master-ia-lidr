# Merge with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  app:
    volumes:
      - .:/app
    entrypoint: ["/bin/sh", "/app/docker/entrypoint-dev.sh"]
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
