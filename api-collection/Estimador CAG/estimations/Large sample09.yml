info:
  name: Large sample09
  type: http
  seq: 9
  tags:
    - estimations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/estimate"
  body:
    type: json
    data: |-
      {
        "transcription": "Plataforma web tipo marketplace de servicios locales (fontaneros, electricistas). Usuarios pueden registrarse como cliente o proveedor. Los clientes publican solicitudes y reciben propuestas; los proveedores responden con presupuestos. Incluye sistema de mensajería interna, valoraciones y perfiles públicos. Panel de administración para moderación de usuarios y contenidos. Pagos integrados (Stripe) con comisión por transacción. Backend con API REST, autenticación JWT, base de datos relacional. Frontend en React. Debe ser responsive. No se requiere app móvil en esta fase."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "estimation": "",
            "model": "",
            "provider": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: Run CAG-style estimation for a single meeting transcription.
