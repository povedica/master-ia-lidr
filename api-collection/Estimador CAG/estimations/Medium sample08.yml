info:
  name: Medium sample08
  type: http
  seq: 7
  tags:
    - estimations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/estimate"
  body:
    type: json
    data: |-
      {
        "transcription": "Dashboard web para equipo comercial. Login, visualización de métricas (ventas, leads, conversión), filtros por fechas y exportación a Excel. Integración con CRM existente vía API REST. Acceso por roles (manager/comercial). No requiere app móvil."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "estimation": "",
            "model": "",
            "provider": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: Run CAG-style estimation for a single meeting transcription.
