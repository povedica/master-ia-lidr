info:
  name: Read Root
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"

docs: Human-friendly entry when opening the base URL in a browser.
