volumes:
  redis_stack_data:

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v0
    ports:
      - "6379:6379"
    volumes:
      - redis_stack_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  app:
    depends_on:
      redis:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5175,http://127.0.0.1:5175
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5175:80"
    depends_on:
      app:
        condition: service_healthy
