services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # Reach the API the same way the host does: published localhost:8000 → host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ESTIMATOR_API_BASE_URL: http://host.docker.internal:8000
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    command:
      - uv
      - run
      - streamlit
      - run
      - app/streamlit_app.py
      - --server.address
      - "0.0.0.0"
      - --server.port
      - "8501"
