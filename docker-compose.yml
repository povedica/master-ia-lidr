volumes:
  redis_stack_data:
  redisinsight_data:
  postgres_data:

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v0
    ports:
      - "6379:6379"
    volumes:
      - redis_stack_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # Web UI for Redis (browse keys, run CLI, inspect modules). http://127.0.0.1:5540 — add database host `redis`, port `6379`.
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: estimator
      POSTGRES_USER: estimator
      POSTGRES_PASSWORD: estimator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimator -d estimator"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  app:
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5175,http://127.0.0.1:5175
      DATABASE_URL: postgresql+asyncpg://estimator:estimator@postgres:5432/estimator
      API_BASE_URL: http://app:8000
    volumes:
      - ./output-responses:/app/output-responses
      - ./output-stats:/app/output-stats
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ""
        VITE_ENABLE_RETRIEVAL_DEBUG: ${VITE_ENABLE_RETRIEVAL_DEBUG:-false}
    ports:
      - "5175:80"
    depends_on:
      app:
        condition: service_healthy
