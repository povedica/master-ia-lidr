info:
  name: Large sample10
  type: http
  seq: 10
  tags:
    - estimations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/estimate"
  body:
    type: json
    data: |-
      {
        "transcription": "Sistema interno de gestión documental para una empresa legal. Acceso autenticado con roles (admin, abogado, cliente). Subida y almacenamiento de documentos (PDF, Word), organización por casos, búsqueda por texto y metadatos. Control de versiones y registro de actividad. Integración con servicio externo de firma digital. Notificaciones por email cuando hay cambios en documentos. Backend con arquitectura modular, almacenamiento seguro (S3 o similar), cifrado en tránsito. Frontend web con interfaz clara orientada a productividad. Incluye logs, auditoría y permisos granulares por documento."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "estimation": "",
            "model": "",
            "provider": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/estimate"
      method: POST
      body:
        type: json
        data: |-
          {
            "transcription": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: Run CAG-style estimation for a single meeting transcription.
